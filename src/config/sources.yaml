sources:
  smap:
    product_id: "SPL4SMGP.008"
    short_name: "SPL4SMGP"
    version: "008"
    bbox: [-65.5, -34.8, -62.0, -30.0]  # Default: Córdoba pilot region
    max_days_range: 7
    description: "SMAP Level 4 Surface and Root Zone Soil Moisture"
    format: "HDF5"
    provider: "NASA Earthdata / NSIDC"

  openweather:
    api_url: "https://api.openweathermap.org/data/3.0/onecall"
    units: "metric"
    description: "OpenWeather One Call API 3.0"
    provider: "OpenWeather"
    notes: "API key via OPENWEATHER_API_KEY env var"

  indec:
    api_url: "https://apis.datos.gob.ar/series/api/series"
    format: "JSON / CSV"
    description: "INDEC socioeconomic indicators"
    provider: "INDEC (Instituto Nacional de Estadística y Censos)"
    status: "design-only"
    notes: "MVP uses seeds/003_socioeconomic_demo.sql instead"

